name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          bun build apps/cli/src/index.ts --compile --outfile dist/my-brain
          bun build apps/cli/src/index.ts --compile --target bun-linux-x64 --outfile dist/my-brain-linux-x64
          bun build apps/cli/src/index.ts --compile --target bun-linux-arm64 --outfile dist/my-brain-linux-arm64
          bun build apps/cli/src/index.ts --compile --target bun-darwin-x64 --outfile dist/my-brain-darwin-x64
          bun build apps/cli/src/index.ts --compile --target bun-darwin-arm64 --outfile dist/my-brain-darwin-arm64

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${RELEASE_TAG}"
          VERSION="${VERSION#v}"
          awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" packages/core/CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release-notes.md
          fi

      - name: Package binaries
        run: |
          cd dist
          tar -czf my-brain-linux-x64.tar.gz my-brain-linux-x64
          tar -czf my-brain-linux-arm64.tar.gz my-brain-linux-arm64
          tar -czf my-brain-darwin-x64.tar.gz my-brain-darwin-x64
          tar -czf my-brain-darwin-arm64.tar.gz my-brain-darwin-arm64
          cp my-brain my-brain-linux-x64  # current platform name

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            my-brain-linux-x64.tar.gz \
            my-brain-linux-arm64.tar.gz \
            my-brain-darwin-x64.tar.gz \
            my-brain-darwin-arm64.tar.gz \
            2>/dev/null || \
          gh release upload "${RELEASE_TAG}" \
            my-brain-linux-x64.tar.gz \
            my-brain-linux-arm64.tar.gz \
            my-brain-darwin-x64.tar.gz \
            my-brain-darwin-arm64.tar.gz \
            --clobber
