<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the-brain — Timeline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    background: #0d1117; color: #c9d1d9; min-height: 100vh;
  }
  .app { display: flex; max-width: 1200px; margin: 0 auto; }
  
  /* Sidebar */
  .sidebar {
    width: 240px; padding: 24px 20px; border-right: 1px solid #21262d;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    background: #0d1117; z-index: 10;
  }
  .sidebar h2 { font-size: 18px; margin-bottom: 24px; color: #58a6ff; }
  .filter-group { margin-bottom: 20px; }
  .filter-group label { display: block; font-size: 11px; text-transform: uppercase; color: #8b949e; margin-bottom: 8px; letter-spacing: 0.5px; }
  .filter-btn {
    display: block; width: 100%; padding: 6px 12px; margin-bottom: 4px;
    background: transparent; color: #8b949e; border: 1px solid transparent;
    border-radius: 6px; font-size: 13px; cursor: pointer; text-align: left;
    transition: all 0.15s; font-family: inherit;
  }
  .filter-btn:hover { background: #21262d; color: #c9d1d9; }
  .filter-btn.active { background: #1f6feb22; color: #58a6ff; border-color: #1f6feb44; }
  .stats { margin-top: 24px; font-size: 12px; color: #8b949e; border-top: 1px solid #21262d; padding-top: 16px; }
  .stats div { margin-bottom: 4px; }

  /* Main */
  .main { flex: 1; padding: 24px 32px; min-height: 100vh; }
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 24px; color: #f0f6fc; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #8b949e; }

  /* Cards */
  .timeline { position: relative; }
  .timeline::before {
    content: ''; position: absolute; left: 15px; top: 0; bottom: 0;
    width: 2px; background: #21262d;
  }
  .card {
    position: relative; margin-bottom: 12px; padding: 14px 18px 14px 44px;
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #30363d; }
  .card::before {
    content: ''; position: absolute; left: 10px; top: 18px;
    width: 12px; height: 12px; border-radius: 50%; border: 2px solid #21262d;
    background: #0d1117;
  }
  .card.layer-0::before { background: #58a6ff; border-color: #58a6ff44; } /* Instant */
  .card.layer-1::before { background: #d2a8ff; border-color: #d2a8ff44; } /* Selection */
  .card.layer-2::before { background: #3fb950; border-color: #3fb95044; } /* Deep */
  .card-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .card-time { font-size: 12px; color: #8b949e; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-source { background: #21262d; color: #8b949e; }
  .badge-source.cursor { color: #f78166; }
  .badge-source.claude { color: #d29922; }
  .badge-source.gemini { color: #58a6ff; }
  .badge-layer { background: #1f6feb22; color: #58a6ff; }
  .card-layer-SELECTION .badge-layer { background: #d2a8ff22; color: #d2a8ff; }
  .card-layer-DEEP .badge-layer { background: #3fb95022; color: #3fb950; }
  .card-content { font-size: 13px; line-height: 1.5; color: #c9d1d9; word-break: break-word; }
  .card-content pre { 
    background: #0d1117; padding: 8px 12px; border-radius: 6px; 
    font-size: 12px; overflow-x: auto; margin: 8px 0; 
    border: 1px solid #21262d;
  }
  .card-content .prompt { color: #79c0ff; }
  .card-content .response { color: #8b949e; margin-top: 4px; }

  /* Loading */
  .loading { text-align: center; padding: 24px; color: #8b949e; font-size: 13px; }
  .empty { text-align: center; padding: 48px 24px; color: #8b949e; }
  .empty h3 { font-size: 16px; margin-bottom: 8px; color: #c9d1d9; }

  /* Responsive */
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid #21262d; padding: 16px; }
    .filter-btn { display: inline-block; width: auto; margin-right: 4px; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>🧠 the-brain</h2>
    <div class="filter-group">
      <label>Layer</label>
      <button class="filter-btn active" data-filter="layer" data-value="all">All layers</button>
      <button class="filter-btn" data-filter="layer" data-value="0">⚡ Instant</button>
      <button class="filter-btn" data-filter="layer" data-value="1">⚖️ Selection</button>
      <button class="filter-btn" data-filter="layer" data-value="2">💎 Deep</button>
    </div>
    <div class="filter-group">
      <label>Source</label>
      <button class="filter-btn active" data-filter="source" data-value="all">All sources</button>
      <button class="filter-btn" data-filter="source" data-value="cursor">Cursor</button>
      <button class="filter-btn" data-filter="source" data-value="claude-code">Claude Code</button>
      <button class="filter-btn" data-filter="source" data-value="gemini">Gemini</button>
    </div>
    <div class="stats" id="stats"></div>
  </aside>
  <main class="main">
    <div class="header">
      <h1>Timeline</h1>
      <p>Recent activity from your brain</p>
    </div>
    <div class="timeline" id="timeline"></div>
    <div class="loading" id="loader">Loading...</div>
  </main>
</div>

<script>
const TIMELINE = document.getElementById('timeline');
const LOADER = document.getElementById('loader');
const STATS = document.getElementById('stats');

let offset = 0, hasMore = true, loading = false;
let filters = { layer: 'all', source: 'all' };

function layerName(l) {
  return ['Instant','Selection','Deep'][l] ?? 'Unknown';
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  const s = Math.floor(diff / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  return `${d}d ago`;
}

function formatContent(raw) {
  let text = raw || '';
  // Escape HTML
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Split prompt/response
  if (text.startsWith('Prompt: ')) {
    const parts = text.split('\nResponse: ');
    if (parts.length === 2) {
      const prompt = parts[0].replace('Prompt: ', '').slice(0, 300);
      const response = parts[1].slice(0, 300);
      return `<span class="prompt">${prompt}</span><div class="response">${response}</div>`;
    }
  }
  return text.slice(0, 500);
}

function renderCard(m) {
  const card = document.createElement('div');
  card.className = `card layer-${m.layer}`;
  const layerClass = m.layer === 1 ? 'SELECTION' : m.layer === 2 ? 'DEEP' : '';
  if (layerClass) card.classList.add(`card-layer-${layerClass}`);
  
  card.innerHTML = `
    <div class="card-meta">
      <span class="card-time">${relativeTime(m.timestamp)}</span>
      <span class="badge badge-source ${m.source}">${m.source || 'unknown'}</span>
      <span class="badge badge-layer">${layerName(m.layer)}</span>
    </div>
    <div class="card-content">${formatContent(m.content)}</div>
  `;
  return card;
}

async function loadMore() {
  if (loading || !hasMore) return;
  loading = true;
  LOADER.textContent = 'Loading...';
  
  const params = new URLSearchParams({ offset, limit: 20 });
  if (filters.layer !== 'all') params.set('layer', filters.layer);
  if (filters.source !== 'all') params.set('source', filters.source);
  
  try {
    const res = await fetch(`/api/timeline?${params}`);
    const data = await res.json();
    if (data.error) { LOADER.textContent = data.error; return; }
    
    hasMore = data.hasMore;
    offset += data.memories.length;
    
    for (const m of data.memories) {
      TIMELINE.appendChild(renderCard(m));
    }
    
    STATS.innerHTML = `<div>${data.total} memories</div><div>Page ${Math.ceil(offset/20)}</div>`;
    
    if (!hasMore) {
      LOADER.textContent = data.total === 0 ? '' : '— End —';
    } else {
      LOADER.textContent = '';
    }
  } catch (e) {
    LOADER.textContent = 'Failed to load. Is the daemon running?';
  } finally {
    loading = false;
  }
}

// Infinite scroll
window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loadMore();
  }
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.filter;
    document.querySelectorAll(`[data-filter="${group}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filters[group] = btn.dataset.value;
    
    // Reset
    TIMELINE.innerHTML = '';
    offset = 0; hasMore = true;
    loadMore();
  });
});

// Initial load
loadMore();
</script>
</body>
</html>
