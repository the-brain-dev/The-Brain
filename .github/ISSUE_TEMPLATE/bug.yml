name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before you start:** Read [CONTRIBUTING.md](https://github.com/oskarschachta/my-brain/blob/main/CONTRIBUTING.md).

        New issues from new contributors are auto-closed by default. Maintainers review auto-closed issues daily. Issues that do not meet the quality bar will not be reopened.

        Keep this short. If it doesn't fit on one screen, it's too long. Write in your own voice.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: e.g. 0.1.0
    validations:
      required: false

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - core
        - plugin-graph-memory
        - plugin-spm-curator
        - plugin-harvester-cursor
        - plugin-harvester-claude
        - plugin-identity-anchor
        - plugin-auto-wiki
        - trainer-local-mlx
        - cli
        - python-sidecar
    validations:
      required: false
